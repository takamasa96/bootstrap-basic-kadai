<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carousel Template · Bootstrap v5.0</title>

    <!-- Bootstrap CSS -->
    <link href="dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="carousel.css" rel="stylesheet">
    <script src="dist/js/bootstrap.bundle.min.js" defer></script>
  </head>

  <body>
    <main>

      <!-- ************************************************ カルーセル開始 -->
      <div id="myCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
        <div class="carousel-inner">

          <div class="carousel-item active">
            <img src="img/top_1.jpg" class="d-block w-100" alt="サンプル画像1">
            <div class="container">
              <div class="carousel-caption">
                <h1>Example headline.</h1>
                <p>説明文がここに入ります。</p>
                <p><a class="btn btn-lg btn-primary" href="#">Sign up today</a></p>
              </div>
            </div>
          </div>

          <div class="carousel-item">
            <img src="img/top_2.jpg" class="d-block w-100" alt="サンプル画像2">
            <div class="container">
              <div class="carousel-caption">
                <h1>Second slide</h1>
                <p>説明文がここに入ります。</p>
                <p><a class="btn btn-lg btn-primary" href="#">Learn more</a></p>
              </div>
            </div>
          </div>

          <div class="carousel-item">
            <img src="img/top_3.jpg" class="d-block w-100" alt="サンプル画像3">
            <div class="container">
              <div class="carousel-caption">
                <h1>Third slide</h1>
                <p>説明文がここに入ります。</p>
                <p><a class="btn btn-lg btn-primary" href="#">Browse gallery</a></p>
              </div>
            </div>
          </div>

        </div>
      </div>
      <!-- ************************************************ カルーセル終了 -->

      <div class="container marketing">

        <div class="row">
          <div class="col-lg-4">
            <img src="img/cake.jpg" class="rounded-circle" alt="サンプル画像2" width="140" height="140">
            <h2>Heading</h2>
            <p>説明文がここに入ります。</p>
            <p><a class="btn btn-secondary" href="#">View details &raquo;</a></p>
          </div>
        </div>

        <hr class="featurette-divider">

        <div class="row featurette">
          <div class="col-md-7">
            <h2 class="featurette-heading">
              First featurette heading.
              <span class="text-muted">It’ll blow your mind.</span>
            </h2>
            <p class="lead">説明文がここに入ります。</p>
          </div>
          <div class="col-md-5">
            <img src="img/sushi.jpg" class="img-fluid" alt="サンプル画像3">
          </div>
        </div>

        <hr class="featurette-divider">

        <footer class="container">
          <p class="float-end"><a href="#">Back to top</a></p>
        </footer>

      </div>

    </main>
  </body>
</html>
